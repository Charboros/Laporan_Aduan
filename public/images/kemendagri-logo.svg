  <path d="M80 420 L130 405 L200 415 L270 405 L320 420 L270 435 L200 445 L130 435 Z" fill="#c8a420"/>
  <text x="200" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a3a6e">KEMENTERIAN DALAM NEGERI</text>
