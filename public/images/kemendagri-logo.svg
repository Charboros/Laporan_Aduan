  <path d="M72 380 C38 364 22 325 42 302 C58 342 76 374 102 384 Z" fill="#2d8a2d"/>
  
  <!-- Leaves right -->
  <path d="M345 320 C370 290 375 250 355 230 C345 270 330 300 315 320 Z" fill="#2d8a2d"/>
  <path d="M340 340 C370 315 380 275 360 255 C348 295 332 325 310 340 Z" fill="#2d8a2d"/>
  <path d="M335 360 C368 340 382 300 362 278 C348 318 330 350 305 362 Z" fill="#2d8a2d"/>
  <path d="M328 380 C362 364 378 325 358 302 C342 342 324 374 298 384 Z" fill="#2d8a2d"/>

  <!-- Cotton flowers left -->
  <circle cx="58" cy="300" r="8" fill="white" opacity="0.9"/>
  <circle cx="65" cy="410" r="8" fill="white" opacity="0.9"/>
  
  <!-- Cotton flowers right -->
  <circle cx="342" cy="300" r="8" fill="white" opacity="0.9"/>
  <circle cx="335" cy="410" r="8" fill="white" opacity="0.9"/>

