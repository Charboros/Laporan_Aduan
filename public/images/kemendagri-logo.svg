  <path d="M175 200 L225 200 L225 228 L175 228 Z" fill="#f8f8f8"/>
  <!-- Bull head on shield -->
  <ellipse cx="200" cy="215" rx="12" ry="10" fill="#1a3a6e"/>
  
  <!-- Tail feathers -->
  <path d="M170 290 L185 320 L200 295 L215 320 L230 290 L215 305 L200 285 L185 305 Z" fill="#c8a420"/>
  
  <!-- Leaves left -->
  <path d="M55 320 C30 290 25 250 45 230 C55 270 70 300 85 320 Z" fill="#2d8a2d"/>
  <path d="M60 340 C30 315 20 275 40 255 C52 295 68 325 90 340 Z" fill="#2d8a2d"/>
